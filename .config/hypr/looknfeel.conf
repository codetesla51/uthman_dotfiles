# ── General ───────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 1
    col.active_border   = $primary $secondary 45deg
    col.inactive_border = $outline
    layout = dwindle
    resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────────
decoration {
    rounding = 12
    rounding_power = 2.4

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
        popups = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
        color_inactive = rgba(00000025)
    }

    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.08
}

# ── Animations ────────────────────────────────────────────────
animations {
    enabled = true

    bezier = overshot,   0.05, 0.9, 0.1, 1.1
    bezier = smooth,     0.25, 1.0, 0.5, 1.0
    bezier = snappy,     0.4,  0.0, 0.2, 1.0
    bezier = bounce,     0.34, 1.56, 0.64, 1.0

    animation = windows,        1, 4,  bounce,  slide
    animation = windowsOut,     1, 3,  smooth,  popin 80%
    animation = windowsMove,    1, 4,  snappy
    animation = border,         1, 8,  smooth
    animation = borderangle,    1, 12, smooth,  once
    animation = fade,           1, 5,  smooth
    animation = fadeOut,        1, 4,  smooth
    animation = workspaces,     1, 5,  overshot, slidevert
    animation = specialWorkspace, 1, 4, smooth, slidevert
}

# ── Dwindle layout ────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
    smart_resizing = true
}

# ── Misc ──────────────────────────────────────────────────────
misc {
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    animate_manual_resizes  = true
    animate_mouse_windowdragging = true
    focus_on_activate       = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
}
