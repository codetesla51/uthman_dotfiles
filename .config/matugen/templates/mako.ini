# Typography
font=FiraCode Nerd Font 10

# Layout
width=400
height=140
padding=20
margin=16
border-size=0
border-radius=12
icon-location=left
max-icon-size=64

# Colors
background-color={{ colors.surface.default.hex }}ee
text-color={{ colors.on_background.default.hex }}
border-color={{ colors.primary.default.hex }}00

# Positioning
anchor=top-right
layer=overlay

# Timing
default-timeout=5000
ignore-timeout=0

# Shadows & Effects
markup=1
max-visible=3
sort=-time

# Progress bar
progress-color=over {{ colors.primary.default.hex }}

[urgency=low]
background-color={{ colors.surface.default.hex }}dd
border-color={{ colors.secondary.default.hex }}

[urgency=normal]
background-color={{ colors.surface.default.hex }}ee
border-color={{ colors.primary.default.hex }}

[urgency=critical]
background-color={{ colors.error.default.hex }}
text-color={{ colors.background.default.hex }}
border-color={{ colors.error.default.hex }}
border-size=2
default-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
