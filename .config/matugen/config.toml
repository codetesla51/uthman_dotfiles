[config]
contrast = 0.5
variation = "standard"

[config.reload_apps]
waybar = true

[templates.waybar]
input_path = "~/.config/matugen/templates/waybar-colors.css"
output_path = "~/.config/waybar/colors.css"

[templates.hyprland-theme]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/theme/themes/snow_black/colors.conf"

[templates.hyprland-current]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/theme/current/colors.conf"

[templates.hyprlock-current]
input_path = "~/.config/matugen/templates/hyprlock-colors.conf"
output_path = "~/.config/theme/current/hyprlock.conf"

[templates.ghostty-theme]
