source = ~/.config/theme/current/hyprlock.conf

general {
    ignore_empty_input = true
    hide_cursor = true
}

# ── Background ────────────────────────────────────────────────
background {
    monitor =
    path = ~/.config/theme/current/background
    color = $color
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
    contrast = 1.0
    vibrancy = 0.25
    vibrancy_darkness = 0.4
}

# ── Clock ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $font_color
    font_size = 160
    font_family = Iceberg
    position = 0, 240
    halign = center
    valign = center
}

# ── Date ──────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = $placeholder_color
    font_size = 26
    font_family = FiraCode Nerd Font
    position = 0, 115
    halign = center
    valign = center
}

# ── Password Input ────────────────────────────────────────────
input-field {
    monitor =
    size = 550, 90
    position = 0, -220
    halign = center
    valign = center
    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 1
    font_family = FiraCode Nerd Font
    font_color = $font_color
    font_size = 16
    placeholder_text =  enter password
    check_color = $check_color
    fail_color = $outer_color
    fail_text =  wrong password
    rounding = 50
    fade_on_empty = true
    hide_input = false
    dots_size = 0.28
    dots_spacing = 0.35
    dots_center = true
    capslock_color = rgb(ff9e64)
}

# ── Battery ───────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] ~/.config/hypr/scripts/battery.sh
    color = $placeholder_color
    font_size = 14
    font_family = FiraCode Nerd Font
    position = 48, 48
    halign = left
    valign = bottom
}

# ── System Info ───────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:10000] ~/.config/hypr/scripts/sysinfo.sh
    color = $placeholder_color
    font_size = 14
    font_family = FiraCode Nerd Font
    position = -48, 48
    halign = right
    valign = bottom
}

# ── Quote ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:0] shuf -n 1 ~/.config/hypr/scripts/quotes.txt
    color = $placeholder_color
    font_size = 15
    font_family = FiraCode Nerd Font
    position = 0, -395
    halign = center
    valign = center
}

# ── Auth ──────────────────────────────────────────────────────
auth {
    fingerprint:enabled = false
}
